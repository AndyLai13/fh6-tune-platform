name = "fh6-tune-platform"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Production bindings (also used by `wrangler dev --local` which emulates locally
# regardless of the IDs — local state lives in .wrangler/state/v3/).
[[d1_databases]]
binding = "DB"
database_name = "fh6-tune-platform-prod"
database_id = "c5d82a42-7511-4b05-a80d-b80e43d2daa2"

[[kv_namespaces]]
binding = "KV"
id = "51f3d475308b438895242169860c4ac0"

# SESSION namespace is auto-generated by @astrojs/cloudflare for Astro session storage.
[[kv_namespaces]]
binding = "SESSION"
id = "325d90f432104d86b4f93e05a473a01e"

[vars]
# Production secrets set via `wrangler secret put` (do NOT put real values here)
